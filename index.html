<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>HA Dashboard</title>
</head>

<body>

    <div class="topbar">
        <button class="back-btn" id="backBtn" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
            </svg>
        </button>
        <span class="topbar-title" id="pageTitle">Hem</span>
        <button class="theme-btn" id="themeBtn" title="Toggle theme">☀️</button>
    </div>

    <!-- MAIN HOME VIEW (All rooms) -->
    <div class="view active" id="home">
        <div class="dashboard">
            <!-- Hobbyrum Section -->
            <room-divider title="Hobbyrum" temp="sensor.hobbyrum_temperatursensor_temperature"
                humidity="sensor.hobbyrum_temperatursensor_humidity"
                motion="binary_sensor.hobbyrum_rorelsesensor_motion">
            </room-divider>
            <light-card entity="light.hobbyrum" navigate="#hobbyrum"></light-card>

            <!-- Example of another section to show the grid styling working correctly! -->
            <room-divider title="Vardagsrum"></room-divider>
            <light-card entity="light.vardagsrum" navigate="#vardagsrum"></light-card>
        </div>
    </div>

    <!-- HOBBYRUM SUBVIEW -->
    <div class="view" id="hobbyrum" style="display:none">
        <div class="dashboard">
            <!-- Master group card (opens popup as usual) -->
            <light-card entity="light.hobbyrum"></light-card>

            <!-- Individual room lights -->
            <light-card entity="light.hobbyrum_play_1"></light-card>
            <light-card entity="light.hobbyrum_play_2"></light-card>
            <light-card entity="light.hobbyrum_play_3"></light-card>
        </div>
    </div>

    <light-popup id="lightPopup"></light-popup>
    <script type="module" src="/src/main.ts"></script>

</body>

</html>
